# =============================================
# Banco de dados H2 in-memory para testes
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# =============================================
# JWT - valores fixos para testes
# =============================================
app.jwt.secret=3E4B6250655368566D5971337436773979244226452948404D6251655468576D5A
app.jwt.expiration-ms=3600000
app.jwt.reset-password-expiration-ms=3600000

# =============================================
# Desabilita scheduling (AuditCleanupScheduler) nos testes
# =============================================
spring.task.scheduling.pool.size=1

# =============================================
# Actuator (apenas health nos testes)
# =============================================
management.endpoints.web.exposure.include=health
management.metrics.export.prometheus.enabled=false

# =============================================
# Auditoria — retencao reduzida para testes
# =============================================
app.audit.retencao-dias=1

# =============================================
# Desabilita logs desnecessários nos testes
# =============================================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.br.umc=INFO
logging.level.br.umc.audit=WARN
