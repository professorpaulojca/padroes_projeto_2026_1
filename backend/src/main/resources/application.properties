# =============================================
# Configuração do Servidor
# =============================================
server.port=8080

# =============================================
# Configuração do PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/aulaspoo
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# Configuração do Spring Data JPA
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================
# Configuração JWT
# =============================================
app.jwt.secret=3E4B6250655368566D5971337436773979244226452948404D6251655468576D5A
app.jwt.expiration-ms=86400000
app.jwt.reset-password-expiration-ms=3600000

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Jackson
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=dd/MM/yyyy

# =============================================
# Spring Actuator + Prometheus
# =============================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics,loggers
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name:padroes-projeto}

# =============================================
# Aplicação
# =============================================
spring.application.name=padroes-projeto

# =============================================
# Logs
# =============================================
app.log.path=logs
app.log.retencao-dias=30

# =============================================
# Auditoria
# =============================================
app.audit.retencao-dias=90
